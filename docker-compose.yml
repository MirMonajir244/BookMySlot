services:
  postgres:
    image: postgres:16-alpine
    container_name: bookmyslot-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bookmyslot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: bookmyslot-app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: bookmyslot
      DB_SSLMODE: disable
      SERVER_PORT: 8080
      JWT_SECRET: change-this-to-a-secure-secret
      JWT_EXPIRY_HOURS: 24
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
